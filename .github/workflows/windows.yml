name: Windows Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Run each test binary directly
        id: run_tests
        continue-on-error: true
        shell: pwsh
        run: |
          $failed = $false
          $report = @()
          $tests = Get-ChildItem -Path build -Recurse -Filter "*_tests.exe"
          foreach ($t in $tests) {
            Write-Host "=== Running $($t.Name) ==="
            $out = & $t.FullName 2>&1 | Out-String
            $ec = $LASTEXITCODE
            Write-Host $out
            if ($ec -ne 0) {
              $report += "### FAIL: $($t.Name) (exit $ec)`n``````\n$out`n``````"
              Write-Host "::error::$($t.Name) FAILED (exit $ec)"
              $failed = $true
            } else {
              $report += "PASS: $($t.Name)"
              Write-Host "::notice::$($t.Name) passed"
            }
          }
          $reportText = $report -join "`n`n"
          Set-Content -Path test_report.md -Value $reportText
          if ($failed) { "tests_failed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }

      - name: Post test results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('test_report.md')) {
              core.warning('test_report.md not found');
              return;
            }
            const report = fs.readFileSync('test_report.md', 'utf8');
            const body = `## Windows test results (run ${context.runId})\n\n${report}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test_report.md
          if-no-files-found: ignore

      - name: Fail if tests failed
        if: steps.run_tests.outputs.tests_failed == 'true'
        run: exit 1
