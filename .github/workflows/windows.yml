name: Windows Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Run each test binary directly
        id: run_tests
        continue-on-error: true
        shell: pwsh
        run: |
          $failed = $false
          $tests = Get-ChildItem -Path build -Recurse -Filter "*_tests.exe"
          foreach ($t in $tests) {
            Write-Host "=== Running $($t.Name) ==="
            $out = & $t.FullName 2>&1
            $ec = $LASTEXITCODE
            Write-Host $out
            if ($ec -ne 0) {
              $msg = "$($t.Name) FAILED (exit $ec): $out"
              Write-Host "::error::$msg"
              $failed = $true
            } else {
              Write-Host "::notice::$($t.Name) passed"
            }
          }
          if ($failed) { exit 1 }

      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
