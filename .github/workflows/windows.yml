name: Windows Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Run each test binary directly
        id: run_tests
        continue-on-error: true
        shell: pwsh
        run: |
          $failed = $false
          $report = @()
          $tests = Get-ChildItem -Path build -Recurse -Filter "*_tests.exe"
          foreach ($t in $tests) {
            Write-Host "=== Running $($t.Name) ==="
            $out = & $t.FullName 2>&1 | Out-String
            $ec = $LASTEXITCODE
            Write-Host $out
            if ($ec -ne 0) {
              $report += "### FAIL: $($t.Name) (exit $ec)`n``````\n$out`n``````"
              Write-Host "::error::$($t.Name) FAILED (exit $ec)"
              $failed = $true
            } else {
              $report += "PASS: $($t.Name)"
              Write-Host "::notice::$($t.Name) passed"
            }
          }
          $reportText = $report -join "`n`n"
          Set-Content -Path test_report.md -Value $reportText
          if ($failed) { "tests_failed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }

      - name: Post test results to PR
        if: always() && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (Test-Path test_report.md) {
            $body = "## Windows test results (run $env:GITHUB_RUN_ID)`n`n" + (Get-Content test_report.md -Raw)
            $body | Set-Content -Path pr_comment.md
            gh pr comment ${{ github.event.pull_request.number }} --body-file pr_comment.md --repo ${{ github.repository }}
          }

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test_report.md
          if-no-files-found: ignore

      - name: Fail if tests failed
        if: steps.run_tests.outputs.tests_failed == 'true'
        run: exit 1
